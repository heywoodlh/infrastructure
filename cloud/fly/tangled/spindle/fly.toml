# fly.toml app configuration file generated for spindle-heywoodlh on 2026-05-12T16:38:15-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spindle-heywoodlh'
primary_region = 'sjc'

[build]
  build-target = "root"

[build.args]
  TANGLED_REPO="heywoodlh.io/core"
  TANGLED_REV="spindle-run"

[env]
  SPINDLE_SERVER_DEV = 'false'
  SPINDLE_SERVER_HOSTNAME = 'spindle.heywoodlh.io'
  SPINDLE_SERVER_OWNER = 'did:plc:ycnss4fntzi3rjuueb7loq3x'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 6555
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 6555

  [[services.ports]]
    port = 6555

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
